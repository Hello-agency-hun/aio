<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 420" role="img" aria-labelledby="title desc">
  <title id="title">AIO audit módszertani folyamat</title>
  <desc id="desc">Letisztult folyamatábra a crawl, SEO alapok, entitásbizalom, citációs alkalmasság és fejlesztési terv lépéseiről.</desc>
  <defs>
    <linearGradient id="soft" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7fffc"/>
      <stop offset="1" stop-color="#fff0fb"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#ff2bc2"/>
      <stop offset="1" stop-color="#6d5cff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#10251f" flood-opacity=".10"/>
    </filter>
  </defs>
  <rect width="1120" height="420" rx="18" fill="url(#soft)"/>
  <g transform="translate(58 58)">
    <text x="0" y="0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#1f1420">AIO/GEO audit folyamat</text>
    <text x="0" y="30" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#765f72">A klasszikus SEO alapokra épülő, citációs és entitásalapú elemzési lánc.</text>
  </g>
  <g transform="translate(58 126)" filter="url(#shadow)">
    <rect width="188" height="170" rx="10" fill="#fff" stroke="#efd9ea"/>
    <rect x="18" y="18" width="44" height="44" rx="10" fill="#fff0fb"/>
    <path d="M30 41h20M40 31v20" stroke="#ff2bc2" stroke-width="4" stroke-linecap="round"/>
    <text x="18" y="88" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#1f1420">1. Crawl</text>
    <text x="18" y="116" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#765f72">HTTP, robots, sitemap,</text>
    <text x="18" y="137" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#765f72">belső linkek, HTML.</text>
  </g>
  <g transform="translate(282 126)" filter="url(#shadow)">
    <rect width="188" height="170" rx="10" fill="#fff" stroke="#efd9ea"/>
    <rect x="18" y="18" width="44" height="44" rx="10" fill="#f2efff"/>
    <path d="M30 48l8-16 8 16M34 42h8" stroke="#6d5cff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="18" y="88" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#1f1420">2. SEO alap</text>
    <text x="18" y="116" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#765f72">Title, meta, H1,</text>
    <text x="18" y="137" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#765f72">canonical, alt szöveg.</text>
  </g>
  <g transform="translate(506 126)" filter="url(#shadow)">
    <rect width="188" height="170" rx="10" fill="#fff" stroke="#efd9ea"/>
    <rect x="18" y="18" width="44" height="44" rx="10" fill="#fff0fb"/>
    <circle cx="33" cy="40" r="7" fill="none" stroke="#ff2bc2" stroke-width="3"/>
    <circle cx="51" cy="31" r="5" fill="none" stroke="#ff2bc2" stroke-width="3"/>
    <circle cx="51" cy="51" r="5" fill="none" stroke="#ff2bc2" stroke-width="3"/>
    <path d="M39 37l8-4M39 43l8 5" stroke="#ff2bc2" stroke-width="3" stroke-linecap="round"/>
    <text x="18" y="88" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#1f1420">3. Entitás</text>
    <text x="18" y="116" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#765f72">@id, sameAs, szerző,</text>
    <text x="18" y="137" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#765f72">Organization schema.</text>
  </g>
  <g transform="translate(730 126)" filter="url(#shadow)">
    <rect width="188" height="170" rx="10" fill="#fff" stroke="#efd9ea"/>
    <rect x="18" y="18" width="44" height="44" rx="10" fill="#fff6e8"/>
    <path d="M30 33h22M30 43h16M30 53h20" stroke="#d28a1f" stroke-width="4" stroke-linecap="round"/>
    <text x="18" y="88" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#1f1420">4. Citáció</text>
    <text x="18" y="116" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#765f72">Answer-first blokkok,</text>
    <text x="18" y="137" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#765f72">források, dátumok.</text>
  </g>
  <g transform="translate(954 126)" filter="url(#shadow)">
    <rect width="108" height="170" rx="10" fill="#1f1420"/>
    <path d="M35 42h40M55 22v40" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
    <text x="20" y="88" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800" fill="#fff">Terv</text>
    <text x="20" y="116" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#f6c7ec">prioritás</text>
    <text x="20" y="137" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#f6c7ec">és javítás</text>
  </g>
  <path d="M246 211h36M470 211h36M694 211h36M918 211h36" stroke="url(#accent)" stroke-width="5" stroke-linecap="round"/>
  <g transform="translate(58 334)">
    <rect width="1004" height="40" rx="8" fill="#ffffff" stroke="#efd9ea"/>
    <text x="18" y="25" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#765f72">A pontozás óvatos: az llms.txt és más emergens GEO jelek hasznosak lehetnek, de nem helyettesítik a crawlolható, hasznos, egyedi tartalmat.</text>
  </g>
</svg>

