<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 360" role="img" aria-labelledby="title desc">
  <title id="title">Citációs alkalmassági modell</title>
  <desc id="desc">A felhasználói kérdésből alkérdések, forráskeresés, bizonyítékválogatás, szintézis és citáció keletkezik.</desc>
  <defs>
    <linearGradient id="line" x1="0" x2="1">
      <stop offset="0" stop-color="#ff2bc2"/>
      <stop offset="1" stop-color="#6d5cff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#10251f" flood-opacity=".10"/>
    </filter>
  </defs>
  <rect width="1120" height="360" rx="18" fill="#ffffff"/>
  <rect x="30" y="28" width="1060" height="304" rx="14" fill="#fff7fd" stroke="#efd9ea"/>
  <text x="60" y="74" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" fill="#1f1420">Hogyan lesz egy oldalból idézhető AI-forrás?</text>
  <text x="60" y="102" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#765f72">Nem elég rangsorolhatónak lenni: a tartalomnak önálló bizonyítékként is működnie kell.</text>
  <path d="M130 188h860" stroke="#efd9ea" stroke-width="10" stroke-linecap="round"/>
  <path d="M130 188h860" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
  <g filter="url(#softShadow)">
    <g transform="translate(82 138)">
      <circle cx="50" cy="50" r="50" fill="#ffffff" stroke="#efd9ea"/>
      <text x="50" y="46" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#1f1420">Kérdés</text>
      <text x="50" y="66" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#765f72">intent</text>
    </g>
    <g transform="translate(300 138)">
      <circle cx="50" cy="50" r="50" fill="#ffffff" stroke="#efd9ea"/>
      <text x="50" y="46" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#1f1420">Fan-out</text>
      <text x="50" y="66" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#765f72">alkérdések</text>
    </g>
    <g transform="translate(518 138)">
      <circle cx="50" cy="50" r="50" fill="#ffffff" stroke="#efd9ea"/>
      <text x="50" y="46" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#1f1420">Forrás</text>
      <text x="50" y="66" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#765f72">bizonyíték</text>
    </g>
    <g transform="translate(736 138)">
      <circle cx="50" cy="50" r="50" fill="#ffffff" stroke="#efd9ea"/>
      <text x="50" y="46" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#1f1420">Szintézis</text>
      <text x="50" y="66" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#765f72">válasz</text>
    </g>
    <g transform="translate(954 138)">
      <circle cx="50" cy="50" r="50" fill="#1f1420"/>
      <text x="50" y="46" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="800" fill="#ffffff">Citáció</text>
      <text x="50" y="66" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="12" fill="#f6c7ec">link</text>
    </g>
  </g>
  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" fill="#765f72">
    <text x="84" y="278">Világos felhasználói probléma</text>
    <text x="294" y="278">Kapcsolódó szándékok</text>
    <text x="502" y="278">Ellenőrizhető válaszblokkok</text>
    <text x="727" y="278">Összerakott AI válasz</text>
    <text x="940" y="278">Forrásként hivatkozás</text>
  </g>
</svg>

